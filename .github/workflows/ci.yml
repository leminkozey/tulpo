name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck shared
        run: bun run --filter @tulpo/shared check

      - name: Typecheck backend
        run: bun run --filter @tulpo/backend check

      - name: Typecheck frontend
        run: bun run --filter @tulpo/frontend check

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build frontend
        run: cd packages/frontend && bun run build
