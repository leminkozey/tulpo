name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck shared
        run: bun run --filter @tulpo/shared check

      - name: Typecheck backend
        run: bun run --filter @tulpo/backend check

      - name: Typecheck frontend
        run: bun run --filter @tulpo/frontend check

  deploy:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            --max-time 120
